name: Release

# Triggers automatically when a commit on master changes package.json version.
# Workflow: bump version in package.json → commit → push → this creates the
# git tag, GitHub release, npm publish, and JSR publish automatically.
# Re-runnable: each step is skipped if its artifact already exists.

on:
  push:
    branches: [master]
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.3.1) — leave blank to use package.json"
        required: false

jobs:
  check-version:
    name: Check what needs publishing
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
      need_tag: ${{ steps.check.outputs.need_tag }}
      need_npm: ${{ steps.check.outputs.need_npm }}
      need_jsr: ${{ steps.check.outputs.need_jsr }}
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Get version
        id: get
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Check what already exists
        id: check
        run: |
          VERSION="${{ steps.get.outputs.version }}"

          # Check git tag
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "need_tag=false" >> "$GITHUB_OUTPUT"
            TAG_EXISTS=true
          else
            echo "need_tag=true" >> "$GITHUB_OUTPUT"
            TAG_EXISTS=false
          fi

          # Check npm
          if npm view "structured-llm@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "need_npm=false" >> "$GITHUB_OUTPUT"
            NPM_EXISTS=true
          else
            echo "need_npm=true" >> "$GITHUB_OUTPUT"
            NPM_EXISTS=false
          fi

          # Check JSR
          if curl -sf "https://jsr.io/@piyushgupta344/structured-llm/${VERSION}_meta.json" > /dev/null 2>&1; then
            echo "need_jsr=false" >> "$GITHUB_OUTPUT"
            JSR_EXISTS=true
          else
            echo "need_jsr=true" >> "$GITHUB_OUTPUT"
            JSR_EXISTS=false
          fi

          # Run if any artifact is missing
          if [ "$TAG_EXISTS" = true ] && [ "$NPM_EXISTS" = true ] && [ "$JSR_EXISTS" = true ]; then
            echo "Tag, npm, and JSR are all up to date — nothing to do"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Tag, release, publish
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_run == 'true'
    permissions:
      contents: write   # create tags and releases
      id-token: write   # npm provenance + JSR OIDC

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Pack smoke test
        run: |
          pnpm pack --pack-destination /tmp
          ls /tmp/structured-llm-*.tgz

      - name: Create git tag
        if: needs.check-version.outputs.need_tag == 'true'
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Extract changelog entry
        if: needs.check-version.outputs.need_tag == 'true'
        id: changelog
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: needs.check-version.outputs.need_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --verify-tag

      - name: Publish to npm
        if: needs.check-version.outputs.need_npm == 'true'
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish to JSR
        if: needs.check-version.outputs.need_jsr == 'true'
        run: npx jsr publish --allow-slow-types --allow-dirty
