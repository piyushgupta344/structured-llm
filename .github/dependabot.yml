version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-tools:
        patterns:
          - "typescript"
          - "tsup"
          - "vitest"
          - "@vitest/*"
          - "vitepress"
    ignore:
      # Major bumps in LLM SDKs often have breaking API changes — review manually
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@anthropic-ai/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@google/genai"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
